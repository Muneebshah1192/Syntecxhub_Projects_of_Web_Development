<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Expense Tracker | Cinematic Dark Mode</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons (makes UI look professional) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts for that premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js for beautiful analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Additional inline styles to ensure everything works */
        .error-state {
            text-align: center;
            padding: 2rem;
            color: #ff2b8f;
        }
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #718096;
        }
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 9999;
        }
        .toast {
            min-width: 300px;
            padding: 1rem 1.5rem;
            background: rgba(20, 25, 35, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
            animation: slideInRight 0.3s ease forwards;
        }
        .toast.success {
            border-color: #00ff9d;
        }
        .toast.error {
            border-color: #ff2b8f;
        }
        .toast.success i {
            color: #00ff9d;
        }
        .toast.error i {
            color: #ff2b8f;
        }
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes slideOutRight {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header with glassmorphism effect -->
        <header class="glass-header">
            <div class="logo-area">
                <i class="fas fa-chart-pie neon-icon"></i>
                <h1>Expense<span>Tracker</span></h1>
            </div>
            <div class="header-badge">
                <span class="badge-premium">Premium Dashboard</span>
                <span class="badge-live">🔴 LIVE</span>
            </div>
        </header>

        <!-- Main Dashboard Area -->
        <main class="dashboard">
            <!-- Summary Cards with glassmorphism -->
            <div class="summary-cards">
                <div class="card glass-card" id="totalBalanceCard">
                    <div class="card-icon">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <div class="card-content">
                        <span class="card-label">Total Balance</span>
                        <span class="card-value" id="totalBalance">$0.00</span>
                    </div>
                    <div class="card-glow"></div>
                </div>

                <div class="card glass-card" id="totalIncomeCard">
                    <div class="card-icon">
                        <i class="fas fa-arrow-up"></i>
                    </div>
                    <div class="card-content">
                        <span class="card-label">Monthly Income</span>
                        <span class="card-value" id="totalIncome">$3,200.00</span>
                    </div>
                    <div class="card-glow"></div>
                </div>

                <div class="card glass-card" id="totalExpensesCard">
                    <div class="card-icon">
                        <i class="fas fa-arrow-down"></i>
                    </div>
                    <div class="card-content">
                        <span class="card-label">Total Expenses</span>
                        <span class="card-value" id="totalExpenses">$0.00</span>
                    </div>
                    <div class="card-glow"></div>
                </div>
            </div>

            <!-- Main Content Area: Form + Chart -->
            <div class="content-grid">
                <!-- Left Column: Form and Filters -->
                <div class="left-column">
                    <!-- Add Expense Form with glassmorphism -->
                    <div class="form-container glass-card">
                        <h2><i class="fas fa-plus-circle"></i> Add New Expense</h2>
                        <form id="expenseForm">
                            <div class="form-group">
                                <label for="title">Title</label>
                                <input type="text" id="title" name="title" placeholder="e.g., Netflix, Lunch, Uber" autocomplete="off">
                                <small class="input-hint">Start typing - we'll auto-categorize!</small>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="amount">Amount ($)</label>
                                    <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" min="0">
                                </div>

                                <div class="form-group">
                                    <label for="date">Date</label>
                                    <input type="date" id="date" name="date">
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="category">Category</label>
                                <select id="category" name="category">
                                    <option value="Food">🍔 Food</option>
                                    <option value="Transport">🚗 Transport</option>
                                    <option value="Subscriptions">📺 Subscriptions</option>
                                    <option value="Tech">💻 Tech</option>
                                    <option value="Shopping">🛍️ Shopping</option>
                                    <option value="Other">📦 Other</option>
                                </select>
                            </div>

                            <button type="submit" class="btn-primary" id="submitBtn">
                                <i class="fas fa-magic"></i> Add Expense
                            </button>
                        </form>
                    </div>

                    <!-- Filter Section -->
                    <div class="filter-container glass-card">
                        <h3><i class="fas fa-filter"></i> Filter by Category</h3>
                        <div class="filter-buttons">
                            <button class="filter-btn active" data-category="all">All</button>
                            <button class="filter-btn" data-category="Food">🍔 Food</button>
                            <button class="filter-btn" data-category="Transport">🚗 Transport</button>
                            <button class="filter-btn" data-category="Subscriptions">📺 Subscriptions</button>
                            <button class="filter-btn" data-category="Tech">💻 Tech</button>
                            <button class="filter-btn" data-category="Shopping">🛍️ Shopping</button>
                        </div>
                    </div>

                    <!-- Recent Transactions List -->
                    <div class="transactions-container glass-card">
                        <h3><i class="fas fa-history"></i> Recent Transactions</h3>
                        <div id="loadingIndicator" class="loading">
                            <div class="spinner"></div>
                            <p>Loading your expenses...</p>
                        </div>
                        <div id="expensesList" class="expenses-list">
                            <!-- Expenses will be dynamically inserted here -->
                        </div>
                    </div>
                </div>

                <!-- Right Column: Chart and Analytics -->
                <div class="right-column">
                    <!-- Chart Container -->
                    <div class="chart-container glass-card">
                        <h3><i class="fas fa-chart-pie"></i> Expenses by Category</h3>
                        <div class="chart-wrapper">
                            <canvas id="expenseChart"></canvas>
                        </div>
                        <div class="chart-legend" id="chartLegend">
                            <!-- Dynamic legend will appear here -->
                        </div>
                    </div>

                    <!-- Quick Stats -->
                    <div class="quick-stats glass-card">
                        <h3><i class="fas fa-bolt"></i> Quick Insights</h3>
                        <div class="stats-grid" id="quickStats">
                            <!-- Stats will be updated dynamically -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Toast Notification Container -->
        <div id="toastContainer" class="toast-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
